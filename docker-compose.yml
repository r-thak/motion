services:
  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    ports:
      - "8002:8002"
    volumes:
      - valhalla_data:/data
    environment:
      - tile_urls=https://download.geofabrik.de/north-america/us/illinois-latest.osm.pbf
      - serve_tiles=True
      - build_elevation=False
      - build_admins=True
      - build_time_zones=True
      - force_rebuild=False
      - use_tiles_ignore_pbf=True
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - VALHALLA_URL=http://valhalla:8002
      - DATABASE_URL=postgresql://freight:freight@postgres:5432/freight
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=21600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      valhalla:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=freight
      - POSTGRES_PASSWORD=freight
      - POSTGRES_DB=freight
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

volumes:
  valhalla_data:
  pg_data:
